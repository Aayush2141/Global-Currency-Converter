<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <h1>💱 Currency Converter</h1>
    <button onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
  </div>

  <div class="container">

    <input type="number" id="amount" placeholder="Enter amount" />

    <select id="from">
      <option value="USD">USD - US Dollar</option>
      <option value="INR">INR - Indian Rupee</option>
      <option value="EUR">EUR - Euro</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <select id="to">
      <option value="INR">INR - Indian Rupee</option>
      <option value="USD">USD - US Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <button onclick="convert()">Convert</button>

    <p id="loading"></p>
    <h2 id="result"></h2>

    <button onclick="saveFavorite()" id="fav-btn" style="display:none;">⭐ Save to Favorites</button>

    <hr />

    <h3>📊 All Exchange Rates</h3>

    <input type="text" id="search" placeholder="Search currency..." />

    <select id="sort" onchange="renderRates()">
      <option value="default">Sort: Default</option>
      <option value="asc">Rate: Low to High</option>
      <option value="desc">Rate: High to Low</option>
      <option value="alpha">A - Z</option>
    </select>

    <select id="filter" onchange="renderRates()">
      <option value="all">All Currencies</option>
      <option value="major">Major Only</option>
    </select>

    <div id="rates-list"></div>

    <hr />

    <h3>❤️ Favorites</h3>
    <div id="favorites-list"><p>No favorites saved.</p></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
